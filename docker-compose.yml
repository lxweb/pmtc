version: '3.8'

services:
  app:
    build: .
    container_name: pmtc-psychology-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    networks:
      - psychology-network

networks:
  psychology-network:
    name: psychology-app-network
    driver: bridge

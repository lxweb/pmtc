version: '3.8'

services:
  # Servicio de desarrollo
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pmtc-psychology-app-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
    networks:
      - psychology-network
    restart: unless-stopped

  # Servicio de producción
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pmtc-psychology-app-prod
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - psychology-network
    restart: unless-stopped
    profiles:
      - production

  # Servicio de construcción
  app-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pmtc-psychology-app-builder
    command: sh -c "npm run build && echo 'Build completed successfully'"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
    networks:
      - psychology-network
    profiles:
      - build

networks:
  psychology-network:
    name: psychology-app-network
    driver: bridge

volumes:
  node_modules:
  next_cache:
